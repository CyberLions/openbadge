<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>OpenBadge Platform icon (white)</title>

<!-- Outer ring -->
<circle cx="340" cy="340" r="300" fill="none" stroke="#ffffff" stroke-width="3"/>
<circle cx="340" cy="340" r="290" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

<!-- Shield body -->
<path d="M340 100 L510 175 L510 355 Q510 505 340 585 Q170 505 170 355 L170 175 Z" fill="#ffffff" opacity="0.15"/>

<!-- Shield inner bevel -->
