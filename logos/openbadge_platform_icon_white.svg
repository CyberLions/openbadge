<!-- Vertical axis line -->
<line x1="340" y1="150" x2="340" y2="540" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

<!-- Checkmark -->
<polyline points="270,340 320,395 415,280" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Accent lines at shield top -->
<path d="M340 130 L485 195" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
<path d="M340 130 L195 195" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

<!-- Decorative dots -->
<circle cx="340" cy="100" r="4" fill="#ffffff"/>
<circle cx="510" cy="175" r="3" fill="#ffffff" opacity="0.5"/>
<circle cx="170" cy="175" r="3" fill="#ffffff" opacity="0.5"/>
<circle cx="340" cy="585" r="4" fill="#ffffff"/>

<!-- Decorative arcs -->
<path d="M180 520 Q100 440 120 340" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
<path d="M500 520 Q580 440 560 340" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

</svg>
